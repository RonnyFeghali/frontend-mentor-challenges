<!DOCTYPE html>
<html lang="en" class="destination">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Bellefair&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
    
    <title>Destination</title>
  </head>
  <body>
    <header>
      <a href="index.html"><img src="./assets/shared/logo.svg" alt="logo" class="logo"></a>
      <nav class="nav-top">
        <ul>
          <li class="home"><a href="index.html"><span>00</span> Home</a></li>
          <li class="destination"><a href="destination.html"><span>01</span> Destination</a></li>
          <li class="crew"><a href="crew.html"><span>02</span> Crew</a></li>
          <li class="technology"><a href="technology.html"><span>03</span> Technology</a></li>
        </ul>
      </nav>
    </header>

    <main>
        <h2 class="destination-title"><span>01</span> Pick you destination</h2>
        <div class="destination-content">

            <div class="destination-image">
                <img src="./assets/destination/image-moon.png">
            </div>

            <div class="destination-info">
                <nav class="nav-destination">
                    <ul>
                        <li class="moon"><a href="#">Moon</a></li>
                        <li class="mars"><a href="#">Mars</a></li>
                        <li class="europa"><a href="#">Europa</a></li>
                        <li class="titan"><a href="#">Titan</a></li>
                    </ul>
                </nav>

                <h3 id="destination-name"></h3>
                <p id="destination-description"></p>
                <hr>
                <div id="stats">
                    <div>
                        <p>Avg. Distance</p>
                        <p id="destination-distance"></p>
                    </div>
                    <div>
                        <p>Est. Travel Time</p>
                        <p id="destination-travel-time"></p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
