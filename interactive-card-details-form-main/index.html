<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
    <title>Frontend Mentor | Interactive card details form</title>

  </head>
  <body>

    <main>

      <section class="cards-container">
        <div class="card-front">
          <div class="decorative">
            <div id="circle-white"></div>
            <div id="circle-empty"></div>
          </div>
          <p id="card-number"></p>
          <div class="name-and-exp">
            <p id="card-name"></p>
            <p id="card-exp-date"></p>
          </div>
        </div>

        <div class="card-back">
          <p id="card-back-placeholder"></p>
        </div>
      </section>

        <div class="form-container">
          <form novalidate name="card-form">
            <div class="field-group">
              <label for="name" class="card-holder">cardholder name</label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="e.g. Jane Appleseed"
                required
              >
              <span class="error-msg" id="error-name"></span>
            </div>

            <div class="field-group">
              <label for="card-nr">card number</label>
              <input
                type="text"
                id="card-nr"
                name="card-nr"
                placeholder="e.g. 1234 5678 9123 0000"
                required
              >
              <span class="error-msg" id="error-card-nr"></span>
            </div>

            <div class="exp-cvc-row">
              <fieldset>
                <legend>Exp. Date (MM/YY)</legend>
                <div class="exp-inputs">
                  <div>
                    <label for="exp-month" class="sr-only">Month</label>
                    <input type="text" id="exp-month" name="exp-month" placeholder="MM">
                  </div>
                  <div>
                    <label for="exp-year" class="sr-only">Year</label>
                    <input type="text" id="exp-year" name="exp-year" placeholder="YY">
                  </div>
                </div>
                <span class="error-msg" id="error-exp"></span>
              </fieldset>

              <div class="cvc-group">
                <label for="cvc">CVC</label>
                <input
                  type="text"
                  id="cvc"
                  name="cvc"
                  placeholder="e.g. 123"
                  required
                >
                <span class="error-msg" id="error-cvc"></span>
              </div>
            </div>

            <button class="confirm-btn">Confirm</button>
          </form>

          <div class="completed-state" id="completed-state">
            <div class="checkmark-circle">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 32 32">
                <path fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" d="M6 16l7 7L26 9"/>
              </svg>
            </div>
            <h2>THANK YOU!</h2>
            <p>We've added your card details</p>
            <button class="continue-btn" id="continue-btn">Continue</button>
          </div>
        </div>
    </main>
    
    <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>
      <span id="separator">|</span>
      Coded by <a href="#">Ronny Feghali</a>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
